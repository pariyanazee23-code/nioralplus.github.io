<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>NioralPlus</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#f5f5f5;
direction:rtl;
}

header{
background:#0a1f44;
color:white;
display:flex;
justify-content:space-between;
padding:15px 40px;
align-items:center;
}

header nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

.hero {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('background1.jpg');
  background-size: cover;
  background-position: center;
  color: white;
  padding: 100px 20px;
  text-align: center;
}

.hero h1{font-size:40px;}

.tours {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}
  .tour-card {
  width: 100%;
}

.tour-card{
background:white;
width:240px;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.tour-card:hover{
transform:scale(1.05);
}

.tour-card img{
width:100%;
height:160px;
object-fit:cover;
}

button{
background:#ff6600;
border:none;
color:white;
padding:10px;
margin:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#e65500;
}

  @media (max-width: 768px) {
  .tours {
    flex-direction: column;
    align-items: center;
  }

  .tour-card {
    width: 90%;
  }

  .hero h1 {
    font-size: 28px;
  }
}
</style>

</head>

<body>

<header>
<h2>✈️ NioralPlus</h2>
<nav>
<a href="#">تور</a>
<a href="#">پرواز</a>
<a href="#">هتل</a>
</nav>
</header>

<section class="hero">
<h1>سفر لوکس با ما</h1>
<p>رزرو آنلاین بلیط، تور و هتل</p>
</section>

<section class="tours">

<section class="tours">

<section class="tours">

<div class="tour-card">
  <img src="dubai.jpg">
  <h3>دبی</h3>
  <p>از 12 میلیون</p>
  <button>رزرو</button>
</div>

<div class="tour-card">
  <img src="istanbol.jpg">
  <h3>استانبول</h3>
  <p>از 9 میلیون</p>
  <button>رزرو</button>
</div>

<div class="tour-card">
  <img src="maldio.jpg">
  <h3>مالدیو</h3>
  <p>از 20 میلیون</p>
  <button>رزرو</button>
</div>

</section>
  
</body>
</html>
