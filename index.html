<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NioralPlus</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Vazirmatn;
    background:#f6f8fc;
}

/* ===== HEADER ===== */
header{
    background:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:800;
    color:#4f46e5;
    font-size:20px;
}

.logo-box{
    width:35px;
    height:35px;
    background:#4f46e5;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
}

.menu i{
    margin:0 10px;
    cursor:pointer;
    color:#333;
}

/* ===== HERO ===== */
.hero{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
    padding:60px 20px;
    text-align:center;
    border-radius:0 0 40px 40px;
}

.hero h1{
    font-size:26px;
    margin-bottom:20px;
}

/* SEARCH BOX */
.search{
    max-width:700px;
    margin:auto;
    display:flex;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.search input{
    flex:1;
    border:none;
    padding:15px;
    outline:none;
}

.search button{
    background:#111827;
    color:white;
    border:none;
    padding:0 25px;
}

/* SERVICES */
.services{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:20px;
    flex-wrap:wrap;
}

.service{
    background:white;
    padding:15px;
    border-radius:15px;
    width:120px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.service i{
    font-size:20px;
    color:#4f46e5;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.price{
    color:#06b6d4;
    font-weight:bold;
}

/* BUTTON */
.btn{
    margin-top:10px;
    background:#4f46e5;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
}

/* ===== FOOTER ===== */
footer{
    background:#111827;
    color:white;
    padding:40px 20px;
    margin-top:30px;
}

.footer-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

footer h3{
    color:#06b6d4;
}

.social i{
    margin-left:10px;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <div class="logo-box">N</div>
        NioralPlus
    </div>

    <div class="menu">
        <i class="fa fa-home"></i>
        <i class="fa fa-plane"></i>
        <i class="fa fa-user"></i>
    </div>
</header>

<section class="hero">
    <h1>رزرو پرواز، هتل و سفر در چند ثانیه</h1>

    <div class="search">
        <input type="text" placeholder="جستجو مقصد، پرواز، هتل...">
        <button><i class="fa fa-search"></i></button>
    </div>
</section>

<section class="services">
    <div class="service"><i class="fa fa-plane"></i><p>پرواز</p></div>
    <div class="service"><i class="fa fa-hotel"></i><p>هتل</p></div>
    <div class="service"><i class="fa fa-bus"></i><p>اتوبوس</p></div>
    <div class="service"><i class="fa fa-map"></i><p>تور</p></div>
</section>

<section class="cards">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1502920917128-1aa500764cbd">
        <div class="card-body">
            <h3>تهران → استانبول</h3>
            <p class="price">۳,۵۰۰,۰۰۰ تومان</p>
            <div class="btn">رزرو</div>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210c6">
        <div class="card-body">
            <h3>هتل دبی</h3>
            <p class="price">۸,۲۰۰,۰۰۰ تومان</p>
            <div class="btn">رزرو</div>
        </div>
    </div>
</section>

<footer>
    <div class="footer-grid">
        <div>
            <h3>NioralPlus</h3>
            <p>پلتفرم رزرو سفر و خدمات گردشگری</p>
        </div>

        <div>
            <h3>لینک‌ها</h3>
            <p>پرواز</p>
            <p>هتل</p>
            <p>تور</p>
        </div>

        <div>
            <h3>تماس</h3>
            <p>پشتیبانی ۲۴ ساعته</p>
        </div>
    </div>

    <div class="social">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-telegram"></i>
        <i class="fab fa-whatsapp"></i>
    </div>
</footer>

</body>
</html>
